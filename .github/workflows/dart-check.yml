name: DART Alert

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - env:
          DART_KEY: ${{ secrets.DART_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scripts/check_dart.py
      - run: |
          git config user.name "dart-bot"
          git config user.email "dart-bot@users.noreply.github.com"
          git add seen.txt
          git diff --staged --quiet || git commit -m "update seen list"
          git push
